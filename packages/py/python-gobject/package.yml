# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-gobject
version    : 3.56.1
release    : 43
source     :
    - https://download.gnome.org/sources/pygobject/3.56/pygobject-3.56.1.tar.gz : 2ec1cc8c55c7ffeebb97e58a9bba7aa1e74611f1173628084685446804a8881a
homepage   : https://gnome.pages.gitlab.gnome.org/pygobject/
license    : LGPL-2.1-or-later
summary    : Python GObject bindings
description: |
    PyGObject provides Python bindings to the GObject class from GLib.
component  : programming.python
builddeps  :
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(py3cairo)
    - pkgconfig(python3)
    - meson-python
    - patchelf
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - python-cairo
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
replaces   :
    - python3-gobject
    - devel : python3-gobject-devel
conflicts  :
    - devel :
        - python2-gobject-devel
